{% load django_browser_reload %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    {% block title %}
        
    {% endblock title %}
</head>
<body>
    <!-- Header -->
    <header class="border-bottom bg-light">
        <div class="container py-3 d-flex justify-content-between align-items-center">

            <nav
                class="navbar navbar-expand-sm navbar-light bg-light"
            >
                <div class="container">
                    <a class="navbar-brand" href="{% url 'transaction_list' %}">Finance Tracker</a>
                    <button
                        class="navbar-toggler d-lg-none"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#collapsibleNavId"
                        aria-controls="collapsibleNavId"
                        aria-expanded="false"
                        aria-label="Toggle navigation"
                    >
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="collapsibleNavId">
                        <ul class="navbar-nav me-auto mt-2 mt-lg-0">
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'transaction_list' %}">Transactions</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'account_list' %}">Accounts</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'category_list' %}">Categories</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
            

            <nav class="navbar">
                {% block navbar %}
                {% endblock %}
            </nav>

        </div>
    </header>
  
 
    <div class="container mt-5">
        {% block content %}
        
        {% endblock content %}
    </div>
{% django_browser_reload_script %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

<!-- Footer -->
<footer class="border-top bg-light mt-auto">
    <div class="container py-3">

        {% block footer %}
            Footer
        {% endblock %}

    </div>
</footer>
</html>
