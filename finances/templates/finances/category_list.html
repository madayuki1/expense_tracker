{% load django_browser_reload %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category List View</title>
</head>
<body>
    <h1>Categories</h1>
    {% for category in object_list %}
    <tr>
        <td>{{ category.name }}</td>
        <br>
    </tr>
    {% endfor %}
    {% django_browser_reload_script %}
</body>
</html>
