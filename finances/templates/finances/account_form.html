{% extends "finances/base.html" %}
{% block content %}
<div class="container">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3 row">
            <label
                for="account-form-name"
                class="col-4 col-form-label"
                >Name</label
            >
            <div
                class="col-8"
            >
            {{ form.name }}
            </div>
        </div>
        <div class="mb-3 row">
            <label
                for="account-form-balance"
                class="col-4 col-form-label"
                >Balance</label
            >
            <div
                class="col-8"
            >
            {{ form.balance }}
            </div>
        </div>
        <div class="mb-3 row">
            <div class="offset-sm-4 col-sm-8">
                <button type="submit" class="btn btn-primary">
                    Submit
                </button>
            </div>
        </div>
    </form>
</div>

{% endblock content %}
